<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD</title>
    <link rel="icon" href="https://avatars.githubusercontent.com/u/225922359?s=400&u=d17c2a1d81602bae66bad0d8dab9b663440fae74&v=4" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .app-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body class="bg-[#F1F5F9]">

    <div class="flex h-screen overflow-hidden relative">
        <aside id="sidebar" class="w-72 bg-white/50 backdrop-blur-xl border-r border-slate-200 p-8 z-30 md:relative absolute inset-y-0 left-0 -translate-x-full transition-transform duration-300 hidden md:flex flex-col">
            <div class="flex items-center justify-between gap-3 mb-12">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 gradient-bg rounded-2xl flex items-center justify-center shadow-lg">
                        <img src="https://i.ibb.co.com/1fHCTtJ5/logo.png" class="w-6 h-6">
                    </div>
                    <h1 class="font-bold text-xl text-slate-900">CORE_SYSTEM</h1>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-slate-500 text-2xl">&times;</button>
            </div>
            <nav id="categoryNav" class="space-y-2 flex-1 overflow-y-auto"></nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 md:p-10">
            <div class="max-w-7xl mx-auto">
                <header class="mb-8 md:mb-10 flex items-center justify-between">
                    <div>
                        <h2 id="currentCategory" class="text-2xl md:text-4xl font-extrabold text-slate-900 tracking-tight">Semua Aplikasi</h2>
                    </div>
                    <button onclick="toggleSidebar()" class="md:hidden gradient-bg text-white p-3 rounded-xl shadow-lg flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </header>

                <div id="appGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    </div>
            </div>
        </main>
    </div>

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-20 hidden md:hidden"></div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbw4s0VNMW8DSiJvHLi0TpxMQuZx886CXSwpxBb4QvBWenRe8krqayg7SrFlEHJxb6YGgQ/exec";
        let allApps = [];

        const colors = ['from-blue-500 to-cyan-400', 'from-purple-500 to-pink-500', 'from-orange-400 to-red-500', 'from-emerald-500 to-teal-400', 'from-amber-400 to-orange-500'];

        fetch(URL)
            .then(res => res.json())
            .then(data => {
                allApps = data;
                renderApps(allApps);
                renderCategories(data);
            });

        function renderApps(apps) {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = apps.map((app, index) => {
                const color = colors[index % colors.length];
                return `
                    <div class="app-card p-6 rounded-3xl shadow-sm hover:shadow-2xl transition-all duration-300 group">
                        <div class="w-16 h-16 bg-gradient-to-tr ${color} rounded-2xl flex items-center justify-center mb-6 shadow-lg transform group-hover:rotate-6 transition-transform">
                            <span class="text-white text-2xl font-bold">${app.nama.charAt(0).toUpperCase()}</span>
                        </div>
                        <h3 class="font-bold text-lg text-slate-900 mb-1">${app.nama}</h3>
                        <p class="text-sm text-slate-500 mb-6 h-10 line-clamp-2">${app.deskripsi || 'Sistem operasional terintegrasi.'}</p>
                        <a href="${app.link}" target="_blank" class="block text-center border-2 border-slate-900 text-slate-900 hover:bg-slate-900 hover:text-white py-3 rounded-xl font-bold transition-all">
                            BUKA APLIKASI
                        </a>
                    </div>
                `;
            }).join('');
        }

        function renderCategories(data) {
            const categories = ['Semua', ...new Set(data.map(app => app.kategori).filter(Boolean))];
            const nav = document.getElementById('categoryNav');
            nav.innerHTML = categories.map(cat => `
                <button onclick="filterApps('${cat}'); if(window.innerWidth < 768) toggleSidebar();" class="w-full text-left px-5 py-3 rounded-xl font-semibold text-slate-600 hover:bg-slate-900 hover:text-white transition-all duration-200">
                    ${cat}
                </button>
            `).join('');
        }

        function filterApps(cat) {
            document.getElementById('currentCategory').innerText = cat + " Aplikasi";
            const filtered = cat === 'Semua' ? allApps : allApps.filter(a => a.kategori === cat);
            renderApps(filtered);
        }

        // Fungsi Toggle Sidebar untuk HP / Tablet
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            if (sidebar.classList.contains('hidden')) {
                sidebar.classList.remove('hidden');
                setTimeout(() => sidebar.classList.remove('-translate-x-full'), 10);
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
                setTimeout(() => sidebar.classList.add('hidden'), 300);
            }
        }
    </script>
</body>
</html>
