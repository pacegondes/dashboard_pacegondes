<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL_OS // DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --bg-dark: #050505; }
        body { font-family: 'JetBrains Mono', monospace; background: var(--bg-dark); color: #fff; overflow-x: hidden; }
        
        /* Glassmorphism & Cyber Glow */
        .glass-panel { background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 242, 255, 0.2); }
        .neon-border { border: 1px solid var(--neon-blue); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        .text-neon { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Header -->
    <header class="flex justify-between items-center mb-10 border-b border-cyan-500/30 pb-6">
        <div>
            <h1 class="text-3xl font-bold tracking-tighter text-neon">SYSTEM_CORE v.2.0</h1>
            <p class="text-xs opacity-60 italic">INTERFACE STATUS: <span class="text-green-400">OPERATIONAL</span></p>
        </div>
        <button id="themeToggle" class="px-4 py-2 border border-cyan-500 hover:bg-cyan-500 hover:text-black transition">SYSTEM_TOGGLE</button>
    </header>

    <!-- Main Grid -->
    <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Input Section -->
        <section class="lg:col-span-1">
            <div class="glass-panel p-6 rounded-sm neon-border">
                <h2 class="text-neon mb-4 uppercase">>> Ingest New Node</h2>
                <input id="title" placeholder="APP_NAME" class="w-full bg-black border border-cyan-900 p-2 mb-4 outline-none focus:border-cyan-500 transition">
                <input id="url" placeholder="URL_ADDRESS" class="w-full bg-black border border-cyan-900 p-2 mb-4 outline-none focus:border-cyan-500 transition">
                <button onclick="addLink()" class="w-full bg-cyan-900/30 border border-cyan-500 py-2 hover:bg-cyan-500 hover:text-black transition uppercase">Upload Link</button>
            </div>
        </section>

        <!-- Display Section -->
        <section class="lg:col-span-2">
            <div id="linkGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <!-- Data akan muncul di sini -->
            </div>
        </section>
    </main>

    <script>
        function addLink() {
            const title = document.getElementById('title').value;
            const url = document.getElementById('url').value;
            if(!title || !url) return;

            const grid = document.getElementById('linkGrid');
            grid.innerHTML += `
                <a href="${url}" target="_blank" class="glass-panel p-5 border border-cyan-900 hover:border-cyan-500 hover:translate-y-[-5px] transition-all group">
                    <h3 class="text-cyan-400 font-bold group-hover:text-white">${title}</h3>
                    <p class="text-[10px] opacity-50 mt-2 truncate">${url}</p>
                    <div class="mt-4 w-full h-1 bg-cyan-900/50"><div class="h-full bg-cyan-500 w-1/2"></div></div>
                </a>
            `;
            // Reset input
            document.getElementById('title').value = '';
            document.getElementById('url').value = '';
        }

        // Toggle Theme Logic
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('bg-white');
            document.body.classList.toggle('text-black');
            document.querySelectorAll('.glass-panel').forEach(el => {
                el.classList.toggle('bg-white');
                el.classList.toggle('bg-[rgba(10,10,15,0.8)]');
            });
        });
    </script>
</body>
</html>
