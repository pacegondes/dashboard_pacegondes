<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Portal | Dashboard Aplikasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dark body { background: radial-gradient(circle at top right, #0f172a, #020617); color: white; }
        body { background-color: #f8fafc; color: #1e293b; transition: all 0.5s ease; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">

    <!-- Toggle Mode -->
    <button onclick="document.documentElement.classList.toggle('dark')" 
            class="fixed top-6 right-6 p-3 rounded-full glass hover:bg-white/20 transition">
        🌓 Toggle Dark/Light
    </button>

    <main class="max-w-4xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-cyan-400">
                Nexus Portal
            </h1>
        </header>

        <!-- Form Input Link -->
        <section class="glass p-8 rounded-3xl mb-12 shadow-xl">
            <h2 class="text-xl font-semibold mb-4">Tambahkan Aplikasi Baru</h2>
            <div class="flex flex-col md:flex-row gap-4">
                <input id="appTitle" type="text" placeholder="Nama Aplikasi" class="flex-1 p-3 rounded-xl bg-white/10 border border-gray-500 outline-none">
                <input id="appUrl" type="url" placeholder="https://link-aplikasi.com" class="flex-1 p-3 rounded-xl bg-white/10 border border-gray-500 outline-none">
                <button onclick="addLink()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl font-bold transition">Tambah</button>
            </div>
        </section>

        <!-- Daftar Aplikasi -->
        <section id="linkContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Contoh Data -->
            <a href="https://google.com" target="_blank" class="group glass p-6 rounded-2xl border hover:border-blue-500 transition-all">
                <h2 class="text-lg font-semibold">Google</h2>
                <span class="text-xs text-blue-400 group-hover:underline">Buka Aplikasi</span>
            </a>
        </section>
    </main>

    <script>
        function addLink() {
            const title = document.getElementById('appTitle').value;
            const url = document.getElementById('appUrl').value;
            if(!title || !url) return alert("Harap isi kedua kolom!");

            const container = document.getElementById('linkContainer');
            const card = document.createElement('a');
            card.href = url;
            card.target = "_blank";
            card.className = "group glass p-6 rounded-2xl border hover:border-blue-500 transition-all";
            card.innerHTML = `<h2 class="text-lg font-semibold">${title}</h2><span class="text-xs text-blue-400 group-hover:underline">Buka Aplikasi</span>`;
            
            container.appendChild(card);
            document.getElementById('appTitle').value = '';
            document.getElementById('appUrl').value = '';
        }
    </script>
</body>
</html>
