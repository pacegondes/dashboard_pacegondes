<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD | My Apps</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co.com/1fHCTtJ5/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div class="flex h-screen">
        <aside class="w-64 bg-white border-r p-6 hidden md:block">
            <div class="flex items-center gap-3 mb-10">
                <img src="https://i.ibb.co.com/1fHCTtJ5/logo.png" class="w-8 h-8">
                <h1 class="font-bold text-xl">KATALOG APP</h1>
            </div>
            <nav id="categoryNav" class="space-y-2">
                <button onclick="filterApps('Semua')" class="w-full text-left p-2 bg-blue-50 text-blue-700 font-bold rounded-lg">Semua Aplikasi</button>
            </nav>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <h2 id="currentCategory" class="text-2xl font-bold mb-6">Semua Aplikasi</h2>
            <div id="appGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
        </main>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbw4s0VNMW8DSiJvHLi0TpxMQuZx886CXSwpxBb4QvBWenRe8krqayg7SrFlEHJxb6YGgQ/exec";
        let allApps = [];

        fetch(URL)
            .then(res => res.json())
            .then(data => {
                allApps = data;
                renderApps(allApps);
                renderCategories(data);
            });

        // Tampilkan Aplikasi
        function renderApps(apps) {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = apps.map(app => `
                <div class="card bg-white p-4 rounded-2xl border border-gray-100 shadow-sm transition-all">
                    <div class="h-24 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl mb-4"></div>
                    <h3 class="font-bold text-sm truncate">${app.nama}</h3>
                    <p class="text-xs text-gray-500 mb-4 h-8">${app.deskripsi || 'Sistem Terintegrasi'}</p>
                    <a href="${app.link}" target="_blank" class="block text-center bg-blue-600 text-white py-2 rounded-lg text-xs font-bold hover:bg-blue-700 transition">BUKA</a>
                </div>
            `).join('');
        }

        // Generate Sidebar Kategori secara otomatis dari data Sheet
        function renderCategories(data) {
            const categories = ['Semua', ...new Set(data.map(app => app.kategori).filter(Boolean))];
            const nav = document.getElementById('categoryNav');
            nav.innerHTML = categories.map(cat => `
                <button onclick="filterApps('${cat}')" class="w-full text-left p-2 hover:bg-gray-100 rounded-lg transition">${cat}</button>
            `).join('');
        }

        // Filter Data
        function filterApps(cat) {
            document.getElementById('currentCategory').innerText = cat + " Aplikasi";
            const filtered = cat === 'Semua' ? allApps : allApps.filter(a => a.kategori === cat);
            renderApps(filtered);
        }
    </script>
</body>
</html>
