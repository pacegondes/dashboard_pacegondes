<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD | My Apps</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co.com/1fHCTtJ5/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div class="flex h-screen">
        <aside class="w-64 bg-white border-r p-6 hidden md:block">
            <div class="flex items-center gap-3 mb-10">
                <img src="https://i.ibb.co.com/1fHCTtJ5/logo.png" class="w-8 h-8">
                <h1 class="font-bold text-xl">KATALOG APP</h1>
            </div>
            <nav class="space-y-2">
                <div class="p-2 bg-blue-50 text-blue-700 font-bold rounded-lg cursor-pointer">Semua Aplikasi</div>
            </nav>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <h2 class="text-2xl font-bold mb-6">Daftar Aplikasi</h2>
            
            <div id="appGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                <p>Memuat aplikasi...</p>
            </div>
        </main>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbw4s0VNMW8DSiJvHLi0TpxMQuZx886CXSwpxBb4QvBWenRe8krqayg7SrFlEHJxb6YGgQ/exec";

        fetch(URL)
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('appGrid');
                grid.innerHTML = '';
                data.forEach(app => {
                    grid.innerHTML += `
                        <div class="card bg-white p-4 rounded-2xl border border-gray-100 shadow-sm transition-all">
                            <div class="h-24 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl mb-4"></div>
                            <h3 class="font-bold text-sm truncate">${app.nama}</h3>
                            <p class="text-xs text-gray-500 mb-4 h-8">${app.deskripsi || 'Sistem Terintegrasi'}</p>
                            <a href="${app.link}" target="_blank" class="block text-center bg-blue-600 text-white py-2 rounded-lg text-xs font-bold hover:bg-blue-700 transition">BUKA</a>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
