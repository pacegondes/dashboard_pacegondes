<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD</title>
    <link rel="icon" href="https://avatars.githubusercontent.com/u/225922359?s=400&u=d17c2a1d81602bae66bad0d8dab9b663440fae74&v=4" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%); }
        .app-card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.4); 
            box-shadow: 0 10 15 -3 rgba(0, 0, 0, 0.05), 0 4 6 -2 rgba(0, 0, 0, 0.02);
        }
        .search-focus:focus-within {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
            border-color: #4f46e5;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-800">

    <div class="flex h-screen overflow-hidden relative">
        <aside id="sidebar" class="w-72 bg-white/70 backdrop-blur-2xl border-r border-slate-100 p-8 z-30 md:relative absolute inset-y-0 left-0 -translate-x-full transition-all duration-300 hidden md:flex flex-col shadow-xl md:shadow-none">
            <div class="flex items-center justify-between gap-3 mb-10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 gradient-bg rounded-2xl flex items-center justify-center shadow-md shadow-indigo-500/30">
                        <img src="https://i.ibb.co.com/1fHCTtJ5/logo.png" class="w-6 h-6">
                    </div>
                    <h1 class="font-bold text-xl text-slate-900 tracking-tight">CORE_SYSTEM</h1>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-slate-400 hover:text-slate-600 text-3xl leading-none">&times;</button>
            </div>
            <nav id="categoryNav" class="space-y-2 flex-1 overflow-y-auto pr-2"></nav>
            <div class="mt-auto pt-6 border-t border-slate-100 text-xs text-slate-400 text-center font-medium">
                v2.0 • Dashboard Modern
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 md:p-10">
            <div class="max-w-7xl mx-auto">
                
                <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-6">
                    <div>
                        <h2 id="currentCategory" class="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight mb-2">Semua Aplikasi</h2>
                        <p class="text-slate-500 text-sm font-medium">Akses sistem operasional terintegrasi dengan mudah.</p>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <div class="search-focus flex items-center bg-white border border-slate-200 rounded-2xl px-4 py-3 w-full md:w-72 transition-all duration-200">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 mr-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                            <input type="text" id="searchBar" onkeyup="processSearch()" placeholder="Cari aplikasi..." class="w-full bg-transparent text-sm font-medium text-slate-700 placeholder-slate-400 focus:outline-none">
                        </div>

                        <button onclick="toggleSidebar()" class="md:hidden gradient-bg text-white p-3.5 rounded-2xl shadow-lg shadow-indigo-500/30 flex items-center justify-center flex-shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                            </svg>
                        </button>
                    </div>
                </header>

                <div id="appGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    </div>
            </div>
        </main>
    </div>

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-20 hidden md:hidden"></div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbw4s0VNMW8DSiJvHLi0TpxMQuZx886CXSwpxBb4QvBWenRe8krqayg7SrFlEHJxb6YGgQ/exec";
        let allApps = [];
        let currentActiveCategory = 'Semua';

        const colors = ['from-blue-600 to-cyan-500', 'from-purple-600 to-pink-500', 'from-orange-500 to-red-500', 'from-emerald-600 to-teal-500', 'from-amber-500 to-orange-600'];

        fetch(URL)
            .then(res => res.json())
            .then(data => {
                allApps = data;
                renderApps(allApps);
                renderCategories(data);
            });

        function renderApps(apps) {
            const grid = document.getElementById('appGrid');
            
            if (apps.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-16 text-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-slate-300 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <p class="text-slate-500 font-semibold text-lg">Aplikasi tidak ditemukan</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = apps.map((app, index) => {
                const color = colors[index % colors.length];
                return `
                    <div class="app-card p-6 rounded-3xl hover:shadow-xl hover:scale-[1.02] transition-all duration-300 group flex flex-col justify-between opacity-0 translate-y-4 animate-[fadeIn_0.5s_ease-in-out_forwards]" style="animation-delay: ${index * 50}ms">
                        <div>
                            <div class="flex justify-between items-start mb-6">
                                <div class="w-16 h-16 bg-gradient-to-tr ${color} rounded-2xl flex items-center justify-center shadow-md shadow-slate-300/50 transform group-hover:-translate-y-1 transition-transform">
                                    <span class="text-white text-2xl font-extrabold">${app.nama.charAt(0).toUpperCase()}</span>
                                </div>
                                ${app.kategori ? `<span class="px-3.5 py-1.5 bg-slate-100 group-hover:bg-indigo-50 group-hover:text-indigo-600 text-slate-600 rounded-xl text-xs font-bold tracking-wider uppercase transition-colors duration-200">${app.kategori}</span>` : ''}
                            </div>
                            <h3 class="font-bold text-xl text-slate-900 mb-2 group-hover:text-indigo-600 transition-colors">${app.nama}</h3>
                            <p class="text-sm text-slate-500 mb-6 h-10 line-clamp-2 leading-relaxed">${app.deskripsi || 'Sistem operasional terintegrasi.'}</p>
                        </div>
                        <a href="${app.link}" target="_blank" class="w-full block text-center bg-slate-900 hover:bg-indigo-600 text-white py-3.5 rounded-2xl font-bold tracking-wide text-sm shadow-md shadow-slate-900/10 hover:shadow-indigo-500/20 transition-all duration-300">
                            BUKA APLIKASI
                        </a>
                    </div>
                `;
            }).join('');
            
            // Injeksi style animasi fade-in sederhana langsung
            if (!document.getElementById('customFadeIn')) {
                const style = document.createElement('style');
                style.id = 'customFadeIn';
                style.innerHTML = `@keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }`;
                document.head.appendChild(style);
            }
        }

        function renderCategories(data) {
            const categories = ['Semua', ...new Set(data.map(app => app.kategori).filter(Boolean))];
            const nav = document.getElementById('categoryNav');
            nav.innerHTML = categories.map(cat => `
                <button onclick="filterApps('${cat}')" class="category-btn w-full text-left px-5 py-3.5 rounded-2xl font-bold text-sm transition-all duration-200 ${cat === 'Semua' ? 'bg-slate-900 text-white shadow-md shadow-slate-900/10' : 'text-slate-600 hover:bg-slate-100'}">
                    ${cat}
                </button>
            `).join('');
        }

        function filterApps(cat) {
            currentActiveCategory = cat;
            document.getElementById('currentCategory').innerText = cat + " Aplikasi";
            
            // Reset pencarian saat ganti kategori
            document.getElementById('searchBar').value = '';
            
            // Styling tombol kategori aktif
            document.querySelectorAll('#categoryNav .category-btn').forEach(btn => {
                if (btn.innerText.trim() === cat) {
                    btn.className = "category-btn w-full text-left px-5 py-3.5 rounded-2xl font-bold text-sm transition-all duration-200 bg-slate-900 text-white shadow-md shadow-slate-900/10";
                } else {
                    btn.className = "category-btn w-full text-left px-5 py-3.5 rounded-2xl font-bold text-sm transition-all duration-200 text-slate-600 hover:bg-slate-100";
                }
            });

            const filtered = cat === 'Semua' ? allApps : allApps.filter(a => a.kategori === cat);
            renderApps(filtered);
            
            if (window.innerWidth < 768) toggleSidebar();
        }

        function processSearch() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            
            // Filter berdasarkan kategori yang sedang dipilih terlebih dahulu
            let baseSource = currentActiveCategory === 'Semua' ? allApps : allApps.filter(a => a.kategori === currentActiveCategory);
            
            // Lakukan pencarian teks
            const filtered = baseSource.filter(app => 
                app.nama.toLowerCase().includes(query) || 
                (app.deskripsi && app.deskripsi.toLowerCase().includes(query))
            );
            
            renderApps(filtered);
        }

        // Fungsi Toggle Sidebar untuk HP / Tablet
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            if (sidebar.classList.contains('hidden')) {
                sidebar.classList.remove('hidden');
                setTimeout(() => sidebar.classList.remove('-translate-x-full'), 10);
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
                setTimeout(() => sidebar.classList.add('hidden'), 300);
            }
        }
    </script>
</body>
</html>
