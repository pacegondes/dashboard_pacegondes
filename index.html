<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Portal | Dashboard Aplikasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .theme-dark { background-color: #0f172a; color: #e2e8f0; }
        .theme-light { background-color: #f8fafc; color: #1e293b; }
    </style>
</head>
<body class="theme-light transition-colors duration-300">

    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 border-r hidden md:block p-6">
            <h2 class="font-bold text-2xl mb-8">Katalog App</h2>
            <nav class="space-y-4">
                <button class="w-full text-left p-2 rounded hover:bg-green-100 dark:hover:bg-green-900">Semua Aplikasi</button>
                <button class="w-full text-left p-2 rounded hover:bg-green-100">Akademik</button>
                <button class="w-full text-left p-2 rounded hover:bg-green-100">Keuangan</button>
            </nav>
        </aside>

        <!-- Main Area -->
        <main class="flex-1 overflow-y-auto p-8">
            <header class="flex justify-between items-center mb-8">
                <input type="text" placeholder="Cari aplikasi..." class="border rounded-full px-6 py-2 w-1/3">
                <button id="modeToggle" class="bg-gray-800 text-white px-4 py-2 rounded-full text-sm">Mode</button>
            </header>

            <!-- Grid Display -->
            <div id="appGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                <!-- Card Template (Bayangkan ini akan terisi banyak) -->
                <div class="card bg-white dark:bg-slate-800 p-4 rounded-2xl border transition-all">
                    <div class="bg-gradient-to-br from-green-400 to-emerald-600 h-24 rounded-xl mb-4"></div>
                    <h3 class="font-bold text-sm">Aplikasi Rapor K13</h3>
                    <p class="text-[10px] text-gray-500 mb-4">Sistem penilaian otomatis</p>
                    <button class="w-full border border-green-600 text-green-600 py-1 rounded-lg text-xs font-bold hover:bg-green-600 hover:text-white">DETAIL</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Toggle Theme
        document.getElementById('modeToggle').onclick = () => {
            document.body.classList.toggle('theme-light');
            document.body.classList.toggle('theme-dark');
        };

        // Simulasi banyak aplikasi (bisa Anda looping dari database)
        const apps = ["Rapor", "Keuangan", "Absensi", "Jadwal", "Inventory", "Surat", "PPDB"];
        const grid = document.getElementById('appGrid');
        
        apps.forEach(app => {
            grid.innerHTML += `
                <div class="card bg-white dark:bg-slate-800 p-4 rounded-2xl border transition-all">
                    <div class="bg-gradient-to-br from-blue-400 to-indigo-600 h-24 rounded-xl mb-4"></div>
                    <h3 class="font-bold text-sm">${app}_System</h3>
                    <p class="text-[10px] text-gray-500 mb-4">Tools efisiensi sekolah</p>
                    <button class="w-full border border-blue-600 text-blue-600 py-1 rounded-lg text-xs font-bold hover:bg-blue-600 hover:text-white">DETAIL</button>
                </div>
            `;
        });
    </script>
</body>
</html>
