<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD | My Apps</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co.com/1fHCTtJ5/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-8 flex items-center gap-3">
            <img src="https://i.ibb.co.com/1fHCTtJ5/logo.png" alt="Logo" class="w-8 h-8">
            Daftar Aplikasi Saya
        </h1>

        <div id="appGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <p class="col-span-full text-center py-10">Memuat data dari database...</p>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbw4s0VNMW8DSiJvHLi0TpxMQuZx886CXSwpxBb4QvBWenRe8krqayg7SrFlEHJxb6YGgQ/exec";

        fetch(URL)
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('appGrid');
                grid.innerHTML = '';
                data.forEach(app => {
                    grid.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                            <div class="h-24 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl mb-4"></div>
                            <h3 class="font-bold text-sm truncate mb-1">${app.nama}</h3>
                            <p class="text-xs text-gray-500 mb-4 h-8 overflow-hidden">${app.deskripsi || 'Sistem Terintegrasi'}</p>
                            <a href="${app.link}" target="_blank" class="block text-center bg-blue-600 text-white py-2 rounded-lg text-xs font-bold hover:bg-blue-700 transition">BUKA</a>
                        </div>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('appGrid').innerHTML = "<p class='col-span-full text-red-500 text-center'>Error: Pastikan Google Apps Script sudah di-deploy dengan akses 'Anyone'</p>";
            });
    </script>
</body>
</html>
