<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD | Ultimate Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .app-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body class="bg-[#F1F5F9]">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-72 bg-white/50 backdrop-blur-xl border-r border-slate-200 p-8 hidden md:flex flex-col">
            <div class="flex items-center gap-3 mb-12">
                <div class="w-10 h-10 gradient-bg rounded-2xl flex items-center justify-center shadow-lg">
                    <img src="https://i.ibb.co.com/1fHCTtJ5/logo.png" class="w-6 h-6">
                </div>
                <h1 class="font-bold text-xl text-slate-900">CORE_SYSTEM</h1>
            </div>
            <nav id="categoryNav" class="space-y-2 flex-1"></nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-10">
            <div class="max-w-7xl mx-auto">
                <header class="mb-10">
                    <h2 id="currentCategory" class="text-4xl font-extrabold text-slate-900 tracking-tight">Semua Aplikasi</h2>
                </header>

                <div id="appGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
            </div>
        </main>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbw4s0VNMW8DSiJvHLi0TpxMQuZx886CXSwpxBb4QvBWenRe8krqayg7SrFlEHJxb6YGgQ/exec";
        let allApps = [];

        // Warna gradasi acak untuk ikon
        const colors = ['from-blue-500 to-cyan-400', 'from-purple-500 to-pink-500', 'from-orange-400 to-red-500', 'from-emerald-500 to-teal-400', 'from-amber-400 to-orange-500'];

        fetch(URL)
            .then(res => res.json())
            .then(data => {
                allApps = data;
                renderApps(allApps);
                renderCategories(data);
            });

        function renderApps(apps) {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = apps.map((app, index) => {
                const color = colors[index % colors.length];
                return `
                    <div class="app-card p-6 rounded-3xl shadow-sm hover:shadow-2xl transition-all duration-300 group">
                        <div class="w-16 h-16 bg-gradient-to-tr ${color} rounded-2xl flex items-center justify-center mb-6 shadow-lg transform group-hover:rotate-6 transition-transform">
                            <span class="text-white text-2xl font-bold">${app.nama.charAt(0).toUpperCase()}</span>
                        </div>
                        <h3 class="font-bold text-lg text-slate-900 mb-1">${app.nama}</h3>
                        <p class="text-sm text-slate-500 mb-6 h-10 line-clamp-2">${app.deskripsi || 'Sistem operasional terintegrasi.'}</p>
                        <a href="${app.link}" target="_blank" class="block text-center border-2 border-slate-900 text-slate-900 hover:bg-slate-900 hover:text-white py-3 rounded-xl font-bold transition-all">
                            BUKA APLIKASI
                        </a>
                    </div>
                `;
            }).join('');
        }

        function renderCategories(data) {
            const categories = ['Semua', ...new Set(data.map(app => app.kategori).filter(Boolean))];
            const nav = document.getElementById('categoryNav');
            nav.innerHTML = categories.map(cat => `
                <button onclick="filterApps('${cat}')" class="w-full text-left px-5 py-3 rounded-xl font-semibold text-slate-600 hover:bg-slate-900 hover:text-white transition-all duration-200">
                    ${cat}
                </button>
            `).join('');
        }

        function filterApps(cat) {
            document.getElementById('currentCategory').innerText = cat + " Aplikasi";
            const filtered = cat === 'Semua' ? allApps : allApps.filter(a => a.kategori === cat);
            renderApps(filtered);
        }
    </script>
</body>
</html>
