<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMAND_CENTER // CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0c; color: #d1d5db; font-family: 'Inter', sans-serif; }
        .panel { background: rgba(20, 20, 24, 0.7); border: 1px solid #2d2d3a; backdrop-filter: blur(10px); }
        .glow-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .btn-active { border-left: 3px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }
        
        /* Dark/Light Logic */
        .light { background: #e5e7eb; color: #1f2937; }
        .light .panel { background: rgba(255, 255, 255, 0.8); border: 1px solid #d1d5db; }
    </style>
</head>
<body class="flex h-screen overflow-hidden transition-all duration-500">

    <!-- Sidebar -->
    <aside class="w-64 panel hidden md:flex flex-col p-6">
        <h1 class="text-xl font-bold mb-10 tracking-widest text-blue-500">SYSTEM_CORE</h1>
        <nav class="space-y-4">
            <a href="#" class="block p-3 btn-active">APPLICATIONS</a>
            <a href="#" class="block p-3 hover:bg-white/5 opacity-50">INFRASTRUCTURE</a>
            <a href="#" class="block p-3 hover:bg-white/5 opacity-50">ANALYTICS</a>
        </nav>
        <div class="mt-auto panel p-4 text-xs opacity-50">STATUS: ACTIVE<br>MEMORY: 48%</div>
    </aside>

    <!-- Main View -->
    <main class="flex-1 flex flex-col p-8 overflow-y-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-3xl font-light text-white">Dashboard <span class="text-blue-500">App Management</span></h2>
                <p class="text-sm opacity-60">Control your digital infrastructure.</p>
            </div>
            <button id="toggleBtn" class="px-4 py-2 bg-blue-600 rounded-md text-white text-sm">TOGGLE MODE</button>
        </header>

        <!-- Input Section -->
        <section class="panel p-6 rounded-lg mb-8 flex gap-4">
            <input id="inName" placeholder="Application Name" class="bg-transparent border border-white/10 p-2 flex-1 rounded">
            <input id="inUrl" placeholder="URL Path" class="bg-transparent border border-white/10 p-2 flex-1 rounded">
            <button onclick="add()" class="bg-blue-600 px-6 py-2 rounded text-white font-bold hover:bg-blue-700">EXECUTE</button>
        </section>

        <!-- Grid -->
        <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- App Card -->
            <div class="panel p-6 rounded-lg border-l-4 border-blue-500">
                <h3 class="font-bold text-white">Main Core</h3>
                <p class="text-xs opacity-50 mb-4">Internal Web Service</p>
                <div class="h-2 w-full bg-black/50 rounded overflow-hidden"><div class="h-full bg-blue-500 w-[70%]"></div></div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('toggleBtn').onclick = () => document.body.classList.toggle('light');
        function add() {
            const name = document.getElementById('inName').value;
            const url = document.getElementById('inUrl').value;
            if(!name) return;
            document.getElementById('grid').innerHTML += `
                <div class="panel p-6 rounded-lg border-l-4 border-emerald-500">
                    <h3 class="font-bold text-white">${name}</h3>
                    <p class="text-xs opacity-50 mb-4">${url}</p>
                    <div class="h-2 w-full bg-black/50 rounded overflow-hidden"><div class="h-full bg-emerald-500 w-100%"></div></div>
                </div>
            `;
        }
    </script>
</body>
</html>
